<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'login.css' %}">
</head>
<body>

<!-- ロゴ -->
<div class="logo">
    <img src="{% static 'bold-logo.webp' %}" alt="logo">
    <span>社内会議室予約システム：ログイン</span>
</div>

<div class="container">
    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>ユーザーID</label>
            <input type="email" name="username" required>
        </div>

        <div class="form-group">
            <label>パスワード</label>
            <input type="password" name="password" required>
        </div>

        <div class="form-group submit-group">
            <button type="submit">Login</button>
        </div>
    </form>
</div>
{% if login_error %}
    <div id="toast" class="toast">
        ユーザーIDまたはパスワードが正しくありません
    </div>
{% endif %}

<script src="{% static 'login.js' %}"></script>

</body>
</html>
